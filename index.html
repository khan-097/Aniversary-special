<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahiya & Junaid | Journey ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --neon: #ff2d55;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; color: white; overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Cinematic Entrance */
        #entrance {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle, #1a0a0f 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .heart-pulse {
            font-size: 5rem; cursor: pointer;
            filter: drop-shadow(0 0 20px var(--neon));
            animation: pulse 1.5s infinite;
        }

        /* Floating Gallery */
        #gallery {
            height: 100vh; position: relative; display: none;
            perspective: 1000px; overflow: hidden;
        }

        .polaroid {
            position: absolute; width: 180px; background: white; padding: 10px 10px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        .polaroid img { width: 100%; height: 200px; object-fit: cover; }

        /* Caption Overlay */
        #caption-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 90%; max-width: 400px; background: rgba(0,0,0,0.9);
            border: 1px solid var(--neon); border-radius: 20px; padding: 20px;
            z-index: 50; text-align: center; pointer-events: none;
        }

        /* Unique Cyber Timer */
        #timer-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 100px;
            padding: 15px 25px; border: 1px solid rgba(255,45,85,0.3);
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 0 30px rgba(255,45,85,0.1); z-index: 20;
        }

        .t-unit { text-align: center; }
        .t-num { 
            display: block; font-family: 'Orbitron', sans-serif; 
            font-size: 1.4rem; color: var(--neon); text-shadow: 0 0 10px var(--neon);
        }
        .t-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="entrance">
        <div class="heart-pulse" onclick="unlock()">❤️</div>
        <p style="margin-top: 20px; font-family: 'Dancing Script'; font-size: 1.5rem;">Click to Enter Our World</p>
    </div>

    <div id="gallery">
        </div>

    <div id="caption-box">
        <h2 id="cap-text" style="font-family: 'Dancing Script'; color: var(--neon); font-size: 1.8rem;"></h2>
    </div>

    <div id="timer-container">
        <div class="t-unit"><span class="t-num" id="d">00</span><span class="t-lab">Days</span></div>
        <div class="t-unit"><span class="t-num" id="h">00</span><span class="t-lab">Hrs</span></div>
        <div class="t-unit"><span class="t-num" id="m">00</span><span class="t-lab">Min</span></div>
        <div class="t-unit"><span class="t-num" id="s">00</span><span class="t-lab">Sec</span></div>
    </div>

    <audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        const photos = [
            { src: 'image_1.png', cap: 'যেদিন প্রথম কথা হয়েছিল... ❤️' },
            { src: 'image_2.png', cap: 'তোমার ঐ মিষ্টি হাসিটা... ✨' },
            { src: 'image_3.png', cap: 'সবচেয়ে প্রিয় মুহূর্ত আমাদের!' }
        ];

        function unlock() {
            document.getElementById('bgMusic').play();
            gsap.to("#entrance", { opacity: 0, duration: 1.5, onComplete: () => {
                document.getElementById('entrance').style.display = 'none';
                document.getElementById('gallery').style.display = 'block';
                spawnPhotos();
            }});
        }

        function spawnPhotos() {
            const gallery = document.getElementById('gallery');
            photos.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'polaroid';
                div.innerHTML = `<img src="${p.src}">`;
                
                // Random position
                div.style.left = (Math.random() * 60 + 10) + '%';
                div.style.top = (Math.random() * 50 + 10) + '%';
                div.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;

                div.onclick = () => showCaption(p.cap, div);
                gallery.appendChild(div);
                
                gsap.from(div, { scale: 0, rotation: 100, duration: 1, delay: i * 0.3 });
            });
        }

        function showCaption(text, element) {
            const capBox = document.getElementById('caption-box');
            const capText = document.getElementById('cap-text');
            
            capText.innerText = text;
            
            // Zoom Effect
            gsap.to(element, { zIndex: 100, scale: 1.5, top: '40%', left: '50%', xPercent: -50, rotation: 0, duration: 0.8 });
            gsap.to(capBox, { scale: 1, y: 100, duration: 0.5, delay: 0.3 });

            setTimeout(() => {
                gsap.to(element, { scale: 1, top: (Math.random() * 50 + 10) + '%', left: (Math.random() * 60 + 10) + '%', rotation: Math.random() * 40 - 20, zIndex: 5, duration: 0.8 });
                gsap.to(capBox, { scale: 0, duration: 0.3 });
            }, 3000);
        }

        // Timer Logic (Dec 27, 2025)
        const start = new Date("2025-12-27T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = Math.abs(now - start);
            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
