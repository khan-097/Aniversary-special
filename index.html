<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের ৪ মাস ❤️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .timer-box { display: flex; justify-content: space-around; font-size: 1.1rem; }

        .heart-btn {
            font-size: 5rem;
            cursor: pointer;
            color: #ff4b2b;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .memory-img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="glass-panel animate__animated animate__fadeInDown" style="margin-top: 30px;">
        <h3>২৭ ডিসেম্বর ২০২৫ থেকে শুরু হওয়া গল্প... ❤️</h3>
        <div id="timer" class="timer-box">
            <div><span id="days">0</span><br><small>দিন</small></div>
            <div><span id="hours">0</span><br><small>ঘণ্টা</small></div>
            <div><span id="minutes">0</span><br><small>মিনিট</small></div>
            <div><span id="seconds">0</span><br><small>সেকেন্ড</small></div>
        </div>
    </div>

    <div class="glass-panel" data-aos="zoom-in">
        <p>চিঠিটি পড়তে লাভ শেপ-এ ক্লিক করো ❤️</p>
        <div class="heart-btn" onclick="startSurprise()">❤️</div>
    </div>

    <div class="glass-panel" data-aos="fade-right">
        <img src="1.jpg" class="memory-img">
        <p>"আমাদের সেই প্রথম চ্যাট..."</p>
    </div>

    <div class="glass-panel" data-aos="fade-left">
        <img src="2.jpg" class="memory-img">
        <p>বেগুনি শাড়িতে তোমাকে পরীর মতো লাগে ✨</p>
    </div>

    <div class="glass-panel" data-aos="zoom-in-up">
        <img src="3.jpg" class="memory-img">
        <p>এই হাসিটা সারাজীবন দেখতে চাই</p>
    </div>

    <div class="glass-panel" data-aos="flip-right">
        <img src="4.jpg" class="memory-img">
        <p>দূরে থাকলেও তুমি সবসময় হৃদয়ে</p>
    </div>

    <div class="glass-panel" data-aos="slide-up">
        <img src="5.jpg" class="memory-img">
        <p>মানিব্যাগ থেকে মন—সবখানেই তুমি ❤️</p>
    </div>

    <audio id="loveSong" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        // Countdown Logic
        const startTime = new Date("2025-12-27T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - startTime;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        function startSurprise() {
            // গান বাজানো শুরু
            document.getElementById('loveSong').play();
            
            // হার্ট রেইন এনিমেশন
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // লাভ লেটার পপ-আপ
            Swal.fire({
                title: 'প্রিয়তাহিয়া ❤️',
                text: '২৭ ডিসেম্বর থেকে আজ পর্যন্ত প্রতিটি মুহূর্ত আমার জন্য উপহার। এভাবেই সারাজীবন পাশে থেকো। ভালোবাসি অনেক!',
                confirmButtonText: 'অনেক ভালোবাসা! ❤️',
                background: '#fff5f5',
                color: '#e84393'
            });
        }
    </script>
</body>
</html>
