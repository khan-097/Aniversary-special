<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের গল্প ❤️</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden; /* স্ক্রল বন্ধ রাখা হয়েছে যাতে এক পেজেই সব সুন্দর দেখায় */
        }

        /* ঝাপসা ব্যাকগ্রাউন্ড */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: blur(6px) brightness(0.6); /* হালকা ঝাপসা এবং একটু অন্ধকার যাতে লেখা স্পষ্ট বোঝা যায় */
            transform: scale(1.1); /* সাইডের সাদা বর্ডার ঢাকতে */
            z-index: -1;
        }

        /* মূল কন্টেন্ট সাজানো */
        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* গ্লাস প্যানেল (স্বচ্ছ বক্স) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            margin: 15px 0;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h3 { margin-top: 0; font-size: 1.3rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }

        /* টাইমার ডিজাইন */
        .timer-box { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; }
        .timer-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; width: 22%; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .timer-item span { font-size: 1.6rem; color: #ff9a9e; }
        .timer-item small { font-size: 0.8rem; font-weight: normal; color: #ddd;}

        /* চিঠির বাটন ডিজাইন */
        .letter-btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.5);
            animation: pulse 2s infinite;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px auto 0;
        }

        .letter-btn:active { transform: scale(0.95); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 117, 140, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 117, 140, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 117, 140, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="content">
        
        <div class="glass-panel animate__animated animate__fadeInDown">
            <h3>২৭ ডিসেম্বর থেকে শুরু হওয়া গল্প... ❤️</h3>
            <div id="timer" class="timer-box">
                <div class="timer-item"><span id="days">0</span><br><small>দিন</small></div>
                <div class="timer-item"><span id="hours">0</span><br><small>ঘণ্টা</small></div>
                <div class="timer-item"><span id="minutes">0</span><br><small>মিনিট</small></div>
                <div class="timer-item"><span id="seconds">0</span><br><small>সেকেন্ড</small></div>
            </div>
        </div>

        <div class="glass-panel animate__animated animate__fadeInUp animate__delay-1s">
            <p style="margin-bottom: 10px; font-size: 1.1rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">তোমার জন্য একটি বিশেষ বার্তা আছে 💌</p>
            <button class="letter-btn" onclick="openLetter()">
                📩 চিঠিটি খুলুন
            </button>
        </div>

    </div>

    <audio id="loveSong" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // টাইমারের হিসাব (২৭ ডিসেম্বর ২০২৫)
        const startTime = new Date("2025-12-27T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = Math.abs(now - startTime); // Math.abs দেওয়া হয়েছে যাতে নেগেটিভ সময় না দেখায়
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        function openLetter() {
            // গান বাজানো শুরু
            document.getElementById('loveSong').play();
            
            // লাভ রেইন অ্যানিমেশন
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // কাস্টম চিঠি (SweetAlert)
            Swal.fire({
                title: 'আমার প্রিয় তাহিয়া ❤️',
                html: `
                    <div style="text-align: left; font-size: 1.1rem; line-height: 1.6; color: #4a4a4a; padding: 10px;">
                        ২৭ ডিসেম্বর থেকে আজ পর্যন্ত প্রতিটি মুহূর্ত আমার জন্য সেরা উপহার।<br><br>
                        তুমি দূরে থাকলেও আমার মনের সবচেয়ে কাছে আছো। মানিব্যাগ থেকে মন—সবখানেই শুধু তুমি। এভাবেই সারাজীবন আমার পাশে থেকো।<br><br>
                        <b>ভালোবাসি অনেক!</b>
                    </div>
                `,
                confirmButtonText: 'অনেক ভালোবাসা! ❤️',
                confirmButtonColor: '#ff758c',
                background: '#fff0f3',
                backdrop: `rgba(0,0,0,0.7)` // চিঠির পেছনের ব্যাকগ্রাউন্ড আরও একটু ডার্ক করবে
            });
        }
    </script>
</body>
</html>
