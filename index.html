<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journey of Hearts ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-love: #ff758c;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #0b0b0b; color: white;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #12050c; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Background Setup */
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: blur(6px) brightness(0.4); z-index: 0; transform: scale(1.1);
        }

        .content {
            position: relative; z-index: 10; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; opacity: 0;
        }

        /* Premium Glass Card */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; padding: 35px 25px; width: 85%; max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-family: 'Dancing Script', cursive; font-size: 2.2rem;
            margin-bottom: 25px; color: #fff;
            text-shadow: 0 0 10px rgba(255, 117, 140, 0.5);
        }

        /* Modern Timer */
        .timer-box { display: flex; justify-content: space-around; gap: 8px; margin-bottom: 30px; }
        .t-unit { background: rgba(0,0,0,0.3); padding: 12px 5px; border-radius: 15px; flex: 1; border: 1px solid rgba(255,255,255,0.05); }
        .t-unit span { display: block; font-size: 1.6rem; font-weight: 600; color: var(--primary-love); }
        .t-unit small { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        /* Floating Button Style */
        .magic-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #ff4b2b; border: none; padding: 18px 35px;
            font-size: 1.1rem; font-weight: 600; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255, 117, 140, 0.3);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            gap: 12px; margin: 0 auto; width: 100%;
        }

        .magic-btn:active { transform: scale(0.95); }

        /* Polaroid Animation */
        .p-stack { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .p-img { 
            width: 75px; height: 95px; background: #fff; padding: 5px 5px 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transform: rotate(-5deg);
        }
        .p-img img { width: 100%; height: 70px; object-fit: cover; }

        /* Floating Hearts */
        .heart {
            position: absolute; color: rgba(255, 117, 140, 0.4);
            pointer-events: none; z-index: 1; animation: floatUp 5s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div style="font-size: 3rem;">💖</div>
        <p style="font-family: 'Dancing Script'; font-size: 1.5rem; color: #ff9a9e;">Our Story is Loading...</p>
    </div>

    <div class="bg-image"></div>

    <div class="content" id="main">
        <div class="glass-card" data-tilt>
            <h2>My Dear Tahiya ❤️</h2>
            
            <div class="timer-box">
                <div class="t-unit"><span id="d">0</span><small>Days</small></div>
                <div class="t-unit"><span id="h">0</span><small>Hours</small></div>
                <div class="t-unit"><span id="m">0</span><small>Mins</small></div>
                <div class="t-unit"><span id="s">0</span><small>Secs</small></div>
            </div>

            <p style="font-size: 0.9rem; margin-bottom: 20px; opacity: 0.9;">Since December 27, 2025</p>

            <button class="magic-btn" onclick="revealAll()">
                <span>💌 Click for Surprise</span>
            </button>
        </div>
    </div>

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. Splash Screen & Reveal
        window.onload = () => {
            gsap.to("#splash", { opacity: 0, duration: 1, delay: 1.5, onComplete: () => {
                document.getElementById('splash').style.display = 'none';
                gsap.to("#main", { opacity: 1, y: 0, duration: 1 });
            }});
            createHearts();
        };

        // 2. Precise Countdown
        const start = new Date("2025-12-27T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = Math.abs(now - start);
            document.getElementById('d').innerText = Math.floor(diff / (86400000));
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        // 3. Floating Hearts Effect
        function createHearts() {
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 20 + 10) + 'px';
                h.style.animationDuration = (Math.random() * 3 + 3) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 5000);
            }, 600);
        }

        // 4. The Reveal Function
        function revealAll() {
            const audio = document.getElementById('music');
            audio.play().catch(() => {}); // Play music

            // Celebration
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            Swal.fire({
                title: '<span style="font-family: \'Dancing Script\'; font-size: 2.2rem; color: #ff4b2b;">To My Favorite Person,</span>',
                html: `
                    <div style="font-family: 'Poppins'; text-align: center; color: #444;">
                        Every single day with you is a gift. <br> 
                        <b>4 Months down, a lifetime to go!</b>
                        
                        <div class="p-stack">
                            <div class="p-img"><img src="1.jpg"></div>
                            <div class="p-img" style="transform: rotate(5deg);"><img src="2.jpg"></div>
                            <div class="p-img" style="transform: rotate(-2deg);"><img src="3.jpg"></div>
                        </div>
                        <br>
                        <p style="font-style: italic; font-size: 0.9rem;">"You're the best thing that ever happened to me."</p>
                    </div>
                `,
                confirmButtonText: 'I Love You! ❤️',
                confirmButtonColor: '#ff758c',
                background: '#fff0f3',
                showClass: { popup: 'animate__animated animate__zoomIn' }
            });
        }
    </script>
</body>
</html>
