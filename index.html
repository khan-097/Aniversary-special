<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity & Beyond ❤️</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root { --glow: #ff2d55; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; }

        /* Initial Portal */
        #portal {
            position: fixed; width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center; z-index: 100;
            background: radial-gradient(circle, #1a0505 0%, #000 100%);
            cursor: pointer;
        }

        .heart-core {
            font-size: 80px; filter: drop-shadow(0 0 20px var(--glow));
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 40px var(--glow)); }
        }

        /* 3D World Setup */
        #world {
            display: none; height: 100vh; width: 100vw; perspective: 1000px;
            background: url('bg.png') no-repeat center/cover;
        }

        .scene {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s ease-out;
        }

        /* Floating 3D Polaroids */
        .card {
            position: absolute; width: 220px; padding: 10px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card img { width: 100%; border-radius: 10px; pointer-events: none; }
        
        .card-1 { top: 15%; left: 10%; transform: translateZ(100px) rotateY(10deg); }
        .card-2 { top: 40%; right: 10%; transform: translateZ(250px) rotateY(-15deg); }
        .card-3 { bottom: 15%; left: 20%; transform: translateZ(150px) rotateX(10deg); }

        .text-overlay {
            position: absolute; bottom: -50px; width: 100%; text-align: center;
            font-size: 1.2rem; color: white; text-shadow: 0 0 10px var(--glow);
            font-style: italic; opacity: 0;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="portal" onclick="breakTheReality()">
        <div class="heart-core">❤️</div>
        <p style="position:absolute; bottom:20%; color:white; letter-spacing:3px; opacity:0.5;">TAP TO ENTER OUR UNIVERSE</p>
    </div>

    <div id="world">
        <div class="scene" id="scene">
            <div class="card card-1"><img src="1.jpg"><div class="text-overlay">Forever...</div></div>
            <div class="card card-2"><img src="2.jpg"><div class="text-overlay">To the Moon...</div></div>
            <div class="card card-3"><img src="3.jpg"><div class="text-overlay">And Back ❤️</div></div>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const bgMusic = document.getElementById('bgMusic');

        function breakTheReality() {
            bgMusic.play();
            
            // GSAP Explosion Animation
            gsap.to(".heart-core", { scale: 50, opacity: 0, duration: 1, ease: "power4.in" });
            gsap.to("#portal", { opacity: 0, duration: 1.2, delay: 0.2, onComplete: () => {
                document.getElementById('portal').style.display = 'none';
                document.getElementById('world').style.display = 'block';
                startWorld();
            }});
        }

        function startWorld() {
            // Reveal cards one by one with glitch effect
            gsap.from(".card", { 
                scale: 0, opacity: 0, stagger: 0.5, duration: 1.5, 
                ease: "elastic.out(1, 0.5)", onComplete: () => {
                    gsap.to(".text-overlay", { opacity: 1, bottom: "10px", duration: 1 });
                }
            });

            // Gyroscope / Mouse Move effect
            window.addEventListener('mousemove', (e) => {
                let x = (window.innerWidth / 2 - e.pageX) / 20;
                let y = (window.innerHeight / 2 - e.pageY) / 20;
                scene.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            });

            // Mobile Device Orientation
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    let x = e.gamma / 2; // Left to Right
                    let y = e.beta / 2;  // Front to Back
                    scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
                });
            }
        }

        // Auto-Confetti on special milestones
        setInterval(() => {
            if(document.getElementById('world').style.display === 'block') {
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#ff2d55', '#ffffff'] });
            }
        }, 5000);
    </script>
</body>
</html>
