<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tahiya's Universe ❤️</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* Loading/Scanner Screen */
        #scanner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0a1a 0%, #000 100%);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .fingerprint-box {
            width: 80px; height: 110px; border: 2px solid #ff2d55; border-radius: 50% 50% 40% 40%;
            position: relative; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 45, 85, 0.5);
        }

        .scan-line {
            width: 100%; height: 2px; background: #ff2d55; position: absolute;
            top: 0; left: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #ff2d55;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Experience Elements */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; opacity: 0; }
        
        .timer-card {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255, 45, 85, 0.3);
            text-align: center; color: #fff; width: 85%; max-width: 350px;
        }

        .anniversary-date { font-family: 'Dancing Script', cursive; font-size: 1.5rem; color: #ff2d55; }
        
        #instructions { position: absolute; top: 20px; color: rgba(255,255,255,0.5); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="scanner-overlay">
        <div id="instructions">Hold to verify identity</div>
        <div class="fingerprint-box" id="fingerprint">
            <div class="scan-line"></div>
            <div style="font-size: 3rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.2;">❤️</div>
        </div>
        <p id="status-text" style="margin-top: 30px; font-size: 0.8rem; color: #ff2d55; letter-spacing: 3px;">AWAITING AUTHENTICATION</p>
    </div>

    <div id="ui-layer">
        <div class="timer-card">
            <div class="anniversary-date">Tahiya & Me</div>
            <div id="clock" style="font-size: 1.2rem; margin-top: 5px;">00:00:00:00</div>
            <div style="font-size: 0.6rem; opacity: 0.6; margin-top: 5px;">SINCE DECEMBER 27, 2025</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, globe, photos = [];
        const textureLoader = new THREE.TextureLoader();
        
        // 1. Initialize 3D Universe
        function initUniverse() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Floating Starfield
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff });
            const starVertices = [];
            for(let i=0; i<5000; i++) {
                starVertices.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeometry, starMaterial));

            // Load Photos onto 3D Cubes/Planes
            const imgPaths = ['1.jpg', '2.jpg', '3.jpg', 'bg.png']; 
            imgPaths.forEach((path, i) => {
                const tex = textureLoader.load(path);
                const geometry = new THREE.PlaneGeometry(3, 4);
                const material = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true });
                const plane = new THREE.Mesh(geometry, material);
                
                // Position in orbit
                const angle = (i / imgPaths.length) * Math.PI * 2;
                plane.position.set(Math.cos(angle)*8, Math.sin(angle)*2, Math.sin(angle)*8);
                plane.lookAt(0, 0, 0);
                scene.add(plane);
                photos.push(plane);
            });

            camera.position.z = 15;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.003; // Auto rotation
            photos.forEach(p => p.rotation.y += 0.01);
            renderer.render(scene, camera);
        }

        // 2. Authentication Logic
        const fingerprint = document.getElementById('fingerprint');
        let pressTimer;

        fingerprint.addEventListener('pointerdown', () => {
            gsap.to(fingerprint, { scale: 0.9, duration: 0.2 });
            document.getElementById('status-text').innerText = "SCANNING ENCRYPTED DATA...";
            pressTimer = setTimeout(unlock, 2000);
        });

        fingerprint.addEventListener('pointerup', () => {
            clearTimeout(pressTimer);
            gsap.to(fingerprint, { scale: 1 });
            if(document.getElementById('status-text').innerText !== "ACCESS GRANTED") {
                document.getElementById('status-text').innerText = "AWAITING AUTHENTICATION";
            }
        });

        function unlock() {
            document.getElementById('status-text').innerText = "ACCESS GRANTED";
            document.getElementById('bgMusic').play();
            
            gsap.to("#scanner-overlay", { 
                opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('scanner-overlay').style.display = 'none';
                    initUniverse();
                    gsap.to("#ui-layer", { opacity: 1, duration: 1 });
                }
            });
        }

        // 3. Precision Timer
        const startDate = new Date("2025-12-27T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = Math.abs(now - startDate);
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('clock').innerText = `${d}D : ${h}H : ${m}M : ${s}S`;
        }, 1000);

        // Responsive resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
